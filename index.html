<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dropshipping Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Store</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Best Deals Online</h2>
    <p>Shop trending products at lowest prices</p>
</section>

<section id="products">
    <h2>Products</h2>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Product 1</h3>
        <p>₹999</p>
        <button onclick="buyNow()">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Product 2</h3>
        <p>₹1499</p>
        <button onclick="buyNow()">Buy Now</button>
    </div>

</section>

<section id="contact">
    <h2>Contact Us</h2>
    <p>Email: mystore@email.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
